<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison — Shop Everything</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #faf7f2;
        --warm: #f2ece0;
        --sand: #e5d9c5;
        --stone: #c9b99a;
        --bark: #7a6248;
        --ink: #1e1810;
        --accent: #c0392b;
        --accent-lt: #e8d5d3;
        --text: #2c231a;
        --muted: #9a8878;
        --border: #ddd3c2;
        --r: 12px;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--cream);
        color: var(--text);
        font-family: "Jost", sans-serif;
        font-weight: 300;
        overflow-x: hidden;
      }

      /* ── ANNOUNCEMENT BAR ── */
      .announcement {
        background: var(--ink);
        color: var(--sand);
        text-align: center;
        padding: 10px;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .announcement span {
        color: var(--stone);
        margin: 0 12px;
      }

      /* ── NAV ── */
      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--cream);
        border-bottom: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 48px;
        height: 68px;
      }
      .nav-links {
        display: flex;
        gap: 28px;
      }
      .nav-links a {
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: var(--ink);
      }
      .nav-logo {
        text-align: center;
        font-family: "Cormorant Garamond", serif;
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--ink);
      }
      .nav-actions {
        display: flex;
        gap: 20px;
        justify-content: flex-end;
        align-items: center;
      }
      .nav-icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: color 0.2s;
      }
      .nav-icon-btn:hover {
        color: var(--ink);
      }
      .cart-count {
        background: var(--accent);
        color: #fff;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        font-size: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 500;
      }

      /* ── HERO ── */
      .hero {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: calc(100vh - 100px);
        overflow: hidden;
      }
      .hero-left {
        background: var(--warm);
        padding: 80px 64px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .hero-left::before {
        content: "";
        position: absolute;
        bottom: -80px;
        left: -80px;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, var(--sand) 0%, transparent 70%);
        pointer-events: none;
      }
      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--bark);
        margin-bottom: 24px;
      }
      .hero-tag::before {
        content: "";
        width: 32px;
        height: 1px;
        background: var(--bark);
      }
      .hero-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(52px, 6vw, 88px);
        font-weight: 300;
        line-height: 1.05;
        color: var(--ink);
        margin-bottom: 24px;
      }
      .hero-title em {
        font-style: italic;
        color: var(--bark);
      }
      .hero-sub {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.8;
        max-width: 380px;
        margin-bottom: 48px;
      }
      .hero-btns {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .btn-fill {
        background: var(--ink);
        color: var(--cream);
        padding: 14px 36px;
        border-radius: 2px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        border: none;
        cursor: pointer;
        transition: background 0.2s, transform 0.15s;
      }
      .btn-fill:hover {
        background: var(--bark);
        transform: translateY(-1px);
      }
      .btn-outline {
        background: transparent;
        color: var(--ink);
        padding: 14px 36px;
        border-radius: 2px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        border: 1px solid var(--border);
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
      }
      .btn-outline:hover {
        border-color: var(--ink);
      }
      .hero-badges {
        display: flex;
        gap: 32px;
        margin-top: 64px;
        padding-top: 32px;
        border-top: 1px solid var(--border);
      }
      .hero-badge-num {
        font-family: "Cormorant Garamond", serif;
        font-size: 36px;
        font-weight: 300;
        color: var(--ink);
      }
      .hero-badge-label {
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .hero-right {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 3px;
        background: var(--border);
      }
      .hero-tile {
        background: var(--warm);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px;
        gap: 12px;
        transition: background 0.25s;
        cursor: pointer;
      }
      .hero-tile:hover {
        background: var(--accent-lt);
      }
      .hero-tile:first-child {
        background: var(--bark);
      }
      .hero-tile:first-child .tile-name {
        color: var(--cream);
      }
      .hero-tile:first-child .tile-label {
        color: var(--stone);
      }
      .tile-emoji {
        font-size: 52px;
        line-height: 1;
      }
      .tile-name {
        font-family: "Cormorant Garamond", serif;
        font-size: 22px;
        font-weight: 400;
        color: var(--ink);
        text-align: center;
      }
      .tile-label {
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--muted);
      }

      /* ── TRUST BAR ── */
      .trust-bar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border-bottom: 1px solid var(--border);
      }
      .trust-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 24px 40px;
        border-right: 1px solid var(--border);
      }
      .trust-item:last-child {
        border-right: none;
      }
      .trust-icon {
        font-size: 22px;
      }
      .trust-text-head {
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.5px;
        color: var(--ink);
      }
      .trust-text-sub {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }

      /* ── SECTION COMMON ── */
      .section {
        padding: 80px 48px;
      }
      .section-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 48px;
      }
      .section-label {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--bark);
        margin-bottom: 8px;
      }
      .section-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(32px, 4vw, 52px);
        font-weight: 300;
        color: var(--ink);
        line-height: 1.1;
      }
      .section-link {
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--muted);
        text-decoration: none;
        border-bottom: 1px solid var(--border);
        padding-bottom: 2px;
        transition: color 0.2s, border-color 0.2s;
      }
      .section-link:hover {
        color: var(--ink);
        border-color: var(--ink);
      }

      /* ── CATEGORY STRIP ── */
      .cat-strip {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: none;
        margin-bottom: 40px;
        flex-wrap: wrap;
      }
      .cat-strip::-webkit-scrollbar {
        display: none;
      }
      .cat-chip {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 20px;
        border-radius: 50px;
        border: 1px solid var(--border);
        background: transparent;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
      }
      .cat-chip.active,
      .cat-chip:hover {
        background: var(--ink);
        color: var(--cream);
        border-color: var(--ink);
      }

      /* ── SEARCH ── */
      .search-input {
        width: 100%;
        max-width: 360px;
        padding: 10px 20px;
        border-radius: 50px;
        border: 1px solid var(--border);
        background: var(--warm);
        font-size: 13px;
        color: var(--ink);
        outline: none;
        font-family: "Jost", sans-serif;
        font-weight: 300;
        margin-bottom: 24px;
        transition: border-color 0.2s;
      }
      .search-input:focus {
        border-color: var(--bark);
      }
      .search-input::placeholder {
        color: var(--stone);
      }

      /* ── PRODUCT GRID ── */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 24px;
      }

      .product-card {
        cursor: pointer;
      }
      .product-card-img {
        background: var(--warm);
        border: 1px solid var(--border);
        border-radius: var(--r);
        height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 80px;
        position: relative;
        overflow: hidden;
        transition: border-color 0.25s;
        margin-bottom: 16px;
      }
      .product-card:hover .product-card-img {
        border-color: var(--bark);
      }
      .product-card-img::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.3) 0%,
          transparent 60%
        );
        pointer-events: none;
      }
      .wishlist-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(250, 247, 242, 0.9);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        cursor: pointer;
        opacity: 0;
        transform: translateY(-4px);
        transition: opacity 0.2s, transform 0.2s, background 0.2s;
      }
      .product-card:hover .wishlist-btn {
        opacity: 1;
        transform: translateY(0);
      }
      .wishlist-btn:hover {
        background: var(--accent-lt);
      }
      .quick-add {
        position: absolute;
        bottom: 12px;
        left: 12px;
        right: 12px;
        background: var(--ink);
        color: var(--cream);
        padding: 10px;
        border-radius: 6px;
        border: none;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        opacity: 0;
        transform: translateY(6px);
        transition: opacity 0.22s, transform 0.22s, background 0.2s;
      }
      .product-card:hover .quick-add {
        opacity: 1;
        transform: translateY(0);
      }
      .quick-add:hover {
        background: var(--bark);
      }
      .quick-add.added {
        background: #2e7d32;
      }

      .product-meta {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
      }
      .product-name {
        font-family: "Cormorant Garamond", serif;
        font-size: 18px;
        font-weight: 400;
        color: var(--ink);
        line-height: 1.3;
      }
      .product-desc {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
        margin-bottom: 10px;
      }
      .product-price {
        font-size: 15px;
        font-weight: 500;
        color: var(--ink);
        white-space: nowrap;
      }
      .badge-new {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        font-size: 9px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 2px;
        margin-bottom: 6px;
        margin-right: 4px;
      }
      .badge-low {
        display: inline-block;
        background: var(--warm);
        color: var(--bark);
        border: 1px solid var(--sand);
        font-size: 9px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 2px;
        margin-bottom: 6px;
      }

      /* ── SKELETON ── */
      .skeleton-card .sk-img {
        background: var(--warm);
        border: 1px solid var(--border);
        border-radius: var(--r);
        height: 280px;
        margin-bottom: 16px;
        animation: shimmer 1.5s ease-in-out infinite;
      }
      .sk-line {
        height: 12px;
        border-radius: 4px;
        background: var(--warm);
        margin-bottom: 8px;
        animation: shimmer 1.5s ease-in-out infinite;
      }
      @keyframes shimmer {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }

      /* ── PROMO BANNER ── */
      .promo-banner {
        margin: 0 48px 80px;
        background: var(--ink);
        border-radius: 20px;
        padding: 64px 80px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 48px;
        position: relative;
        overflow: hidden;
      }
      .promo-banner::before {
        content: "";
        position: absolute;
        right: 240px;
        top: -60px;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(192, 57, 43, 0.25) 0%,
          transparent 60%
        );
        pointer-events: none;
      }
      .promo-tag {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--stone);
        margin-bottom: 12px;
      }
      .promo-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(36px, 4vw, 56px);
        font-weight: 300;
        color: var(--cream);
        line-height: 1.1;
      }
      .promo-title em {
        font-style: italic;
        color: var(--stone);
      }
      .promo-sub {
        color: var(--muted);
        font-size: 14px;
        margin-top: 12px;
      }
      .btn-accent {
        background: var(--accent);
        color: #fff;
        padding: 16px 40px;
        border-radius: 2px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        border: none;
        cursor: pointer;
        white-space: nowrap;
        transition: opacity 0.2s, transform 0.15s;
      }
      .btn-accent:hover {
        opacity: 0.85;
        transform: translateY(-1px);
      }

      /* ── ERROR STATE ── */
      .error-state {
        text-align: center;
        padding: 80px 48px;
        background: var(--warm);
        border: 1px solid var(--border);
        border-radius: 16px;
        max-width: 440px;
        margin: 0 auto;
      }
      .error-icon {
        font-size: 40px;
        margin-bottom: 16px;
      }
      .error-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 28px;
        font-weight: 300;
        color: var(--ink);
        margin-bottom: 8px;
      }
      .error-msg {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
        margin-bottom: 24px;
      }
      .retry-btn {
        background: var(--ink);
        color: var(--cream);
        border: none;
        border-radius: 2px;
        padding: 12px 28px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s;
      }
      .retry-btn:hover {
        background: var(--bark);
      }

      /* ── TOAST ── */
      .toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ink);
        color: var(--cream);
        padding: 14px 28px;
        border-radius: 50px;
        font-size: 13px;
        letter-spacing: 0.3px;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 300;
        white-space: nowrap;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
        animation: toastIn 0.3s ease;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      /* ── FOOTER ── */
      footer {
        background: var(--ink);
        color: var(--stone);
        padding: 64px 48px 32px;
      }
      .footer-top {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr;
        gap: 48px;
        padding-bottom: 48px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .footer-brand {
        font-family: "Cormorant Garamond", serif;
        font-size: 28px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--cream);
        margin-bottom: 16px;
      }
      .footer-tagline {
        font-size: 13px;
        line-height: 1.7;
        color: var(--muted);
        max-width: 260px;
      }
      .footer-col-title {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--cream);
        margin-bottom: 20px;
      }
      .footer-col a {
        display: block;
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        margin-bottom: 10px;
        transition: color 0.2s;
      }
      .footer-col a:hover {
        color: var(--stone);
      }
      .footer-bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 24px;
      }
      .footer-copy {
        font-size: 12px;
        color: var(--muted);
      }
      .footer-socials {
        display: flex;
        gap: 12px;
      }
      .social-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        cursor: pointer;
        transition: border-color 0.2s;
        color: var(--stone);
        text-decoration: none;
      }
      .social-btn:hover {
        border-color: var(--stone);
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 900px) {
        nav {
          padding: 0 20px;
        }
        .nav-links {
          display: none;
        }
        .hero {
          grid-template-columns: 1fr;
          min-height: auto;
        }
        .hero-right {
          display: none;
        }
        .hero-left {
          padding: 48px 24px;
        }
        .section {
          padding: 60px 20px;
        }
        .promo-banner {
          margin: 0 20px 60px;
          padding: 40px 28px;
          grid-template-columns: 1fr;
        }
        .trust-bar {
          grid-template-columns: 1fr 1fr;
        }
        .trust-item {
          padding: 16px 16px;
        }
        .footer-top {
          grid-template-columns: 1fr 1fr;
          gap: 32px;
        }
        .footer-bottom {
          flex-direction: column;
          gap: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { Component, Fragment } = React;

      function getEmoji(name, desc) {
        const s = (name + " " + (desc || "")).toLowerCase();
        if (s.match(/shirt|tee|cloth|wear|fashion|dress|jeans|jacket|hoodie/))
          return "👕";
        if (s.match(/shoe|sneaker|boot|footwear|sandal/)) return "👟";
        if (s.match(/bag|backpack|purse|wallet|tote/)) return "👜";
        if (s.match(/watch|clock/)) return "⌚";
        if (s.match(/book|novel|read/)) return "📚";
        if (s.match(/food|snack|coffee|tea|drink|eat/)) return "🍵";
        if (s.match(/beauty|skin|cream|lotion|perfume|makeup/)) return "🧴";
        if (s.match(/plant|flower|garden/)) return "🌿";
        if (s.match(/toy|game|play/)) return "🎲";
        if (s.match(/sport|gym|yoga|fitness/)) return "🏃";
        if (s.match(/phone|laptop|computer|tech|electronic/)) return "💻";
        if (s.match(/kitchen|cook|home|decor|furniture/)) return "🏠";
        return "🛍️";
      }

      function formatPrice(p) {
        return "$" + parseFloat(p).toFixed(2);
      }

      /* ── Skeleton ── */
      class SkeletonCard extends Component {
        render() {
          return (
            <div className="skeleton-card">
              <div className="sk-img" />
              <div className="sk-line" style={{ width: "60%" }} />
              <div className="sk-line" style={{ width: "80%" }} />
              <div className="sk-line" style={{ width: "40%" }} />
            </div>
          );
        }
      }

      /* ── Product Card ── */
      class ProductCard extends Component {
        constructor(props) {
          super(props);
          this.state = { added: false, wished: false };
          this.handleAdd = this.handleAdd.bind(this);
          this.handleWish = this.handleWish.bind(this);
        }
        handleAdd(e) {
          e.stopPropagation();
          this.setState({ added: true });
          this.props.onAdd(this.props.product);
          setTimeout(() => this.setState({ added: false }), 1500);
        }
        handleWish(e) {
          e.stopPropagation();
          this.setState((prev) => ({ wished: !prev.wished }));
        }
        render() {
          const { product } = this.props;
          const { added, wished } = this.state;
          return (
            <div className="product-card">
              <div className="product-card-img">
                {getEmoji(product.name, product.description)}
                <button className="wishlist-btn" onClick={this.handleWish}>
                  {wished ? "❤️" : "🤍"}
                </button>
                <button
                  className={`quick-add${added ? " added" : ""}`}
                  onClick={this.handleAdd}
                >
                  {added ? "✓ Added to Bag" : "+ Add to Bag"}
                </button>
              </div>
              <div>
                {product.stock > 15 && <span className="badge-new">New</span>}
                {product.stock <= 8 && (
                  <span className="badge-low">Only {product.stock} left</span>
                )}
                <div className="product-meta">
                  <div className="product-name">{product.name}</div>
                  <div className="product-price">
                    {formatPrice(product.price)}
                  </div>
                </div>
                {product.description && (
                  <div className="product-desc">{product.description}</div>
                )}
              </div>
            </div>
          );
        }
      }

      /* ── Main App ── */
      class App extends Component {
        constructor(props) {
          super(props);
          this.state = {
            products: [],
            loading: true,
            error: null,
            cart: [],
            toast: null,
            filter: "All",
            search: "",
          };
          this.shopRef = React.createRef();
          this.fetchProducts = this.fetchProducts.bind(this);
          this.handleAdd = this.handleAdd.bind(this);
          this.handleShop = this.handleShop.bind(this);
        }

        componentDidMount() {
          this.fetchProducts();
        }

        async fetchProducts() {
          this.setState({ loading: true, error: null });
          try {
            const res = await fetch("http://localhost:8000/api/products/");
            if (!res.ok) throw new Error(`Server responded with ${res.status}`);
            const data = await res.json();
            this.setState({ products: data, loading: false });
          } catch (err) {
            this.setState({ error: err.message, loading: false });
          }
        }

        handleAdd(product) {
          this.setState((prev) => ({ cart: [...prev.cart, product] }));
          if (this._t) clearTimeout(this._t);
          this.setState({ toast: `${product.name} added to your bag` });
          this._t = setTimeout(() => this.setState({ toast: null }), 2800);
        }

        handleShop() {
          this.shopRef.current?.scrollIntoView({ behavior: "smooth" });
        }

        getCategories() {
          const cats = new Set();
          this.state.products.forEach((p) => {
            const s = (p.name + " " + (p.description || "")).toLowerCase();
            if (
              s.match(
                /shirt|tee|cloth|wear|fashion|dress|jeans|jacket|hoodie|shoe|sneaker|bag|backpack/
              )
            )
              cats.add("Fashion");
            else if (
              s.match(/phone|laptop|computer|tech|electronic|watch|clock/)
            )
              cats.add("Electronics");
            else if (s.match(/book|novel/)) cats.add("Books");
            else if (s.match(/beauty|skin|cream|makeup|lotion/))
              cats.add("Beauty");
            else if (s.match(/food|snack|coffee|tea|drink/))
              cats.add("Food & Drink");
            else if (s.match(/home|kitchen|cook|decor|furniture/))
              cats.add("Home");
            else cats.add("General");
          });
          return ["All", ...cats];
        }

        getFiltered() {
          let list = this.state.products;
          const { filter, search } = this.state;
          if (search.trim()) {
            const q = search.toLowerCase();
            list = list.filter(
              (p) =>
                p.name.toLowerCase().includes(q) ||
                (p.description || "").toLowerCase().includes(q)
            );
          }
          if (filter === "All") return list;
          return list.filter((p) => {
            const s = (p.name + " " + (p.description || "")).toLowerCase();
            if (filter === "Fashion")
              return !!s.match(
                /shirt|tee|cloth|wear|fashion|dress|jeans|jacket|hoodie|shoe|sneaker|bag|backpack/
              );
            if (filter === "Electronics")
              return !!s.match(
                /phone|laptop|computer|tech|electronic|watch|clock/
              );
            if (filter === "Books") return !!s.match(/book|novel/);
            if (filter === "Beauty")
              return !!s.match(/beauty|skin|cream|makeup|lotion/);
            if (filter === "Food & Drink")
              return !!s.match(/food|snack|coffee|tea|drink/);
            if (filter === "Home")
              return !!s.match(/home|kitchen|cook|decor|furniture/);
            return !s.match(
              /shirt|tee|cloth|wear|fashion|dress|jeans|jacket|hoodie|shoe|sneaker|bag|backpack|phone|laptop|computer|tech|electronic|watch|clock|book|novel|beauty|skin|cream|makeup|lotion|food|snack|coffee|tea|drink|home|kitchen|cook|decor|furniture/
            );
          });
        }

        render() {
          const { loading, error, cart, toast, filter, search } = this.state;
          const categories = this.getCategories();
          const filtered = this.getFiltered();

          return (
            <Fragment>
              <nav>
                <div className="nav-links">
                  <a href="./Login/login.html">Login</a>
                  <a href="./Register/register.html">Register</a>
                </div>
                <div className="nav-logo">Maison</div>
                <div className="nav-actions">
                  <button className="nav-icon-btn">
                    🛍️ Bag
                    {cart.length > 0 && (
                      <span className="cart-count">{cart.length}</span>
                    )}
                  </button>
                </div>
              </nav>
              <div className="section" ref={this.shopRef}>
                <div className="section-head">
                  <div>
                    <div className="section-title">Featured Products</div>
                  </div>
                </div>

                {!loading && !error && (
                  <input
                    className="search-input"
                    type="text"
                    placeholder="Search products..."
                    value={search}
                    onChange={(e) => this.setState({ search: e.target.value })}
                  />
                )}

                {!loading && !error && categories.length > 1 && (
                  <div className="cat-strip">
                    {categories.map((cat) => (
                      <button
                        key={cat}
                        className={`cat-chip${filter === cat ? " active" : ""}`}
                        onClick={() => this.setState({ filter: cat })}
                      >
                        {cat}
                      </button>
                    ))}
                  </div>
                )}

                {loading && (
                  <div className="product-grid">
                    {[1, 2, 3, 4, 5, 6].map((i) => (
                      <SkeletonCard key={i} />
                    ))}
                  </div>
                )}

                {error && (
                  <div className="error-state">
                    <div className="error-icon">⚠️</div>
                    <div className="error-title">Couldn't Load Products</div>
                    <div className="error-msg">
                      Make sure your API is running at{" "}
                      <strong>localhost:8000</strong>.<br />
                      <small style={{ opacity: 0.6 }}>{error}</small>
                    </div>
                    <button className="retry-btn" onClick={this.fetchProducts}>
                      Try Again
                    </button>
                  </div>
                )}

                {!loading && !error && filtered.length === 0 && (
                  <div className="error-state">
                    <div className="error-icon">🔍</div>
                    <div className="error-title">No Results Found</div>
                    <div className="error-msg">
                      Try a different search term or category.
                    </div>
                  </div>
                )}

                {!loading && !error && filtered.length > 0 && (
                  <div className="product-grid">
                    {filtered.map((p, i) => (
                      <ProductCard key={i} product={p} onAdd={this.handleAdd} />
                    ))}
                  </div>
                )}
              </div>

              <footer>
                <div className="footer-top">
                  <div>
                    <div className="footer-brand">Maison</div>
                    <div className="footer-tagline">
                      Your one-stop shop for everything you need — delivered
                      with care, every time.
                    </div>
                  </div>

                  <div className="footer-col">
                    <div className="footer-col-title">Help</div>
                    <a href="#">FAQ</a>
                    <a href="#">Shipping Info</a>
                    <a href="#">Returns</a>
                    <a href="#">Contact Us</a>
                  </div>
                  <div className="footer-col">
                    <div className="footer-col-title">Company</div>
                    <a href="#">About Us</a>
                    <a href="#">Blog</a>
                    <a href="#">Careers</a>
                    <a href="#">Press</a>
                  </div>
                </div>
                <div className="footer-bottom">
                  <div className="footer-copy">
                    © 2026 Maison. All rights reserved.
                  </div>
                  <div className="footer-socials">
                    <a href="#" className="social-btn">
                      𝕏
                    </a>
                    <a href="#" className="social-btn">
                      ig
                    </a>
                    <a href="#" className="social-btn">
                      fb
                    </a>
                  </div>
                </div>
              </footer>

              {toast && <div className="toast">🛍️ {toast}</div>}
            </Fragment>
          );
        }
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
