<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison — Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #faf7f2;
        --warm: #f2ece0;
        --sand: #e5d9c5;
        --stone: #c9b99a;
        --bark: #7a6248;
        --ink: #1e1810;
        --accent: #c0392b;
        --accent-lt: #e8d5d3;
        --text: #2c231a;
        --muted: #9a8878;
        --border: #ddd3c2;
        --r: 12px;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--cream);
        color: var(--text);
        font-family: "Jost", sans-serif;
        font-weight: 300;
        min-height: 100vh;
      }

      /* ── NAV ── */
      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--cream);
        border-bottom: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 48px;
        height: 68px;
      }
      .nav-logo {
        text-align: center;
        font-family: "Cormorant Garamond", serif;
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--ink);
      }
      .nav-user {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .nav-user-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--bark);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Cormorant Garamond", serif;
        font-size: 15px;
        color: var(--cream);
        font-weight: 600;
        flex-shrink: 0;
      }
      .nav-user-name {
        font-size: 13px;
        color: var(--text);
        letter-spacing: 0.3px;
      }
      .nav-user-role {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .nav-actions {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: flex-end;
      }
      .nav-home-link {
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        transition: color 0.2s;
      }
      .nav-home-link:hover {
        color: var(--ink);
      }

      /* Cart icon */
      .cart-icon-btn {
        position: relative;
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        transition: color 0.2s;
        text-decoration: none;
      }
      .cart-icon-btn:hover {
        color: var(--bark);
      }
      .cart-icon-btn svg {
        display: block;
      }
      .cart-badge {
        position: absolute;
        top: 0px;
        right: 0px;
        background: var(--accent);
        color: white;
        font-size: 9px;
        font-weight: 500;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Jost", sans-serif;
        line-height: 1;
        pointer-events: none;
      }

      .logout-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 7px 18px;
        border-radius: 2px;
        font-family: "Jost", sans-serif;
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }
      .logout-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── PAGE LAYOUT ── */
      .page {
        padding: 48px;
      }

      .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 40px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--border);
      }
      .page-label {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--bark);
        margin-bottom: 6px;
      }
      .page-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(32px, 4vw, 48px);
        font-weight: 300;
        color: var(--ink);
        line-height: 1.1;
      }
      .product-count {
        font-family: "Cormorant Garamond", serif;
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 1px;
      }

      /* ── SEARCH + FILTER ── */
      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 32px;
        flex-wrap: wrap;
      }
      .search-input {
        padding: 10px 20px;
        border-radius: 50px;
        border: 1px solid var(--border);
        background: var(--warm);
        font-size: 13px;
        color: var(--ink);
        outline: none;
        font-family: "Jost", sans-serif;
        font-weight: 300;
        width: 280px;
        transition: border-color 0.2s;
      }
      .search-input:focus {
        border-color: var(--bark);
      }
      .search-input::placeholder {
        color: var(--stone);
      }
      .cat-chip {
        padding: 9px 18px;
        border-radius: 50px;
        border: 1px solid var(--border);
        background: transparent;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Jost", sans-serif;
      }
      .cat-chip.active,
      .cat-chip:hover {
        background: var(--ink);
        color: var(--cream);
        border-color: var(--ink);
      }

      /* ── PRODUCT GRID ── */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 24px;
      }
      .product-card {
        cursor: pointer;
      }
      .product-card-img {
        background: var(--warm);
        border: 1px solid var(--border);
        border-radius: var(--r);
        height: 240px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 72px;
        position: relative;
        overflow: hidden;
        transition: border-color 0.25s;
        margin-bottom: 14px;
      }
      .product-card:hover .product-card-img {
        border-color: var(--bark);
      }
      .product-card-img::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.3) 0%,
          transparent 60%
        );
        pointer-events: none;
      }
      .stock-pill {
        position: absolute;
        top: 12px;
        left: 12px;
        padding: 3px 10px;
        border-radius: 50px;
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "Jost", sans-serif;
      }
      .stock-pill.ok {
        background: var(--warm);
        color: var(--bark);
        border: 1px solid var(--sand);
      }
      .stock-pill.low {
        background: var(--accent-lt);
        color: var(--accent);
        border: 1px solid var(--accent-lt);
      }
      .quick-add {
        position: absolute;
        bottom: 12px;
        left: 12px;
        right: 12px;
        background: var(--ink);
        color: var(--cream);
        padding: 10px;
        border-radius: 6px;
        border: none;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        font-family: "Jost", sans-serif;
        opacity: 0;
        transform: translateY(6px);
        transition: opacity 0.2s, transform 0.2s, background 0.2s;
      }
      .product-card:hover .quick-add {
        opacity: 1;
        transform: translateY(0);
      }
      .quick-add:hover {
        background: var(--bark);
      }
      .quick-add.added {
        background: #2e7d32;
      }
      .product-meta {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
      }
      .product-name {
        font-family: "Cormorant Garamond", serif;
        font-size: 18px;
        font-weight: 400;
        color: var(--ink);
        line-height: 1.3;
      }
      .product-desc {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }
      .product-price {
        font-size: 15px;
        font-weight: 500;
        color: var(--ink);
        white-space: nowrap;
      }

      /* ── SKELETON ── */
      .sk-img {
        background: var(--warm);
        border: 1px solid var(--border);
        border-radius: var(--r);
        height: 240px;
        margin-bottom: 14px;
        animation: shimmer 1.5s ease-in-out infinite;
      }
      .sk-line {
        height: 12px;
        border-radius: 4px;
        background: var(--warm);
        margin-bottom: 8px;
        animation: shimmer 1.5s ease-in-out infinite;
      }
      @keyframes shimmer {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }

      /* ── STATES ── */
      .state-box {
        text-align: center;
        padding: 80px 48px;
        background: var(--warm);
        border: 1px solid var(--border);
        border-radius: 16px;
        max-width: 440px;
        margin: 80px auto;
      }
      .state-icon {
        font-size: 40px;
        margin-bottom: 16px;
      }
      .state-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 28px;
        font-weight: 300;
        color: var(--ink);
        margin-bottom: 8px;
      }
      .state-msg {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
        margin-bottom: 24px;
      }
      .state-btn {
        background: var(--ink);
        color: var(--cream);
        border: none;
        border-radius: 2px;
        padding: 12px 28px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        font-family: "Jost", sans-serif;
        transition: background 0.2s;
      }
      .state-btn:hover {
        background: var(--bark);
      }
      .state-btn.accent {
        background: var(--accent);
      }
      .state-btn.accent:hover {
        opacity: 0.85;
      }

      /* ── TOAST ── */
      .toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ink);
        color: var(--cream);
        padding: 14px 28px;
        border-radius: 50px;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 300;
        white-space: nowrap;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
        animation: toastIn 0.3s ease;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      /* ── FOOTER ── */
      footer {
        background: var(--ink);
        color: var(--stone);
        padding: 32px 48px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        margin-top: 80px;
      }
      .footer-brand {
        font-family: "Cormorant Garamond", serif;
        font-size: 22px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--cream);
      }
      .footer-copy {
        font-size: 12px;
        color: var(--muted);
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 768px) {
        nav {
          padding: 0 20px;
        }
        .page {
          padding: 32px 20px;
        }
        footer {
          padding: 24px 20px;
          flex-direction: column;
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { Component, Fragment } = React;

      function getEmoji(name, desc) {
        const s = (name + " " + (desc || "")).toLowerCase();
        if (s.match(/shirt|tee|cloth|wear|fashion|dress|jeans|jacket|hoodie/))
          return "👕";
        if (s.match(/shoe|sneaker|boot|footwear|sandal/)) return "👟";
        if (s.match(/bag|backpack|purse|wallet|tote/)) return "👜";
        if (s.match(/watch|clock/)) return "⌚";
        if (s.match(/book|novel|read/)) return "📚";
        if (s.match(/food|snack|coffee|tea|drink|eat/)) return "🍵";
        if (s.match(/beauty|skin|cream|lotion|perfume|makeup/)) return "🧴";
        if (s.match(/plant|flower|garden/)) return "🌿";
        if (s.match(/toy|game|play/)) return "🎲";
        if (s.match(/sport|gym|yoga|fitness/)) return "🏃";
        if (s.match(/phone|laptop|computer|tech|electronic/)) return "💻";
        if (s.match(/kitchen|cook|home|decor|furniture/)) return "🏠";
        return "🛍️";
      }

      function formatPrice(p) {
        return "$" + parseFloat(p).toFixed(2);
      }

      function getInitials(username) {
        if (!username) return "?";
        return username.slice(0, 2).toUpperCase();
      }

      /* Cart Icon SVG */
      function CartIcon() {
        return (
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="1.5"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
          </svg>
        );
      }

      /* ── Skeleton ── */
      class SkeletonCard extends Component {
        render() {
          return (
            <div>
              <div className="sk-img" />
              <div className="sk-line" style={{ width: "55%" }} />
              <div className="sk-line" style={{ width: "75%" }} />
              <div className="sk-line" style={{ width: "35%" }} />
            </div>
          );
        }
      }

      /* ── Product Card ── */
      class ProductCard extends Component {
        constructor(props) {
          super(props);
          this.state = { added: false };
          this.handleAdd = this.handleAdd.bind(this);
        }
        handleAdd(e) {
          e.stopPropagation();
          this.setState({ added: true });
          this.props.onAdd(this.props.product);
          setTimeout(() => this.setState({ added: false }), 1500);
        }
        render() {
          const { product } = this.props;
          const { added } = this.state;
          const isLow = product.stock <= 8;
          return (
            <div className="product-card">
              <div className="product-card-img">
                {getEmoji(product.name, product.description)}
                <span className={`stock-pill ${isLow ? "low" : "ok"}`}>
                  {isLow
                    ? `⚡ ${product.stock} left`
                    : `✓ ${product.stock} in stock`}
                </span>
                <button
                  className={`quick-add${added ? " added" : ""}`}
                  onClick={this.handleAdd}
                >
                  {added ? "✓ Added to Bag" : "+ Add to Bag"}
                </button>
              </div>
              <div>
                <div className="product-meta">
                  <div className="product-name">{product.name}</div>
                  <div className="product-price">
                    {formatPrice(product.price)}
                  </div>
                </div>
                {product.description && (
                  <div className="product-desc">{product.description}</div>
                )}
              </div>
            </div>
          );
        }
      }

      /* ── Dashboard ── */
      class Dashboard extends Component {
        constructor(props) {
          super(props);
          this.state = {
            user: null,
            products: [],
            loadingUser: true,
            loadingProducts: true,
            userError: null,
            productError: null,
            toast: null,
            search: "",
            filter: "All",
            cartCount: 0,
          };
          this.fetchUser = this.fetchUser.bind(this);
          this.fetchProducts = this.fetchProducts.bind(this);
          this.handleLogout = this.handleLogout.bind(this);
          this.handleAdd = this.handleAdd.bind(this);
          this.fetchCartCount = this.fetchCartCount.bind(this);
        }

        componentDidMount() {
          this.fetchUser();
          this.fetchProducts();
          this.fetchCartCount();
        }

        fetchCartCount() {
          const token = localStorage.getItem("accessToken");
          if (!token) return;
          fetch("http://localhost:8000/api/cart/items/", {
            headers: { Authorization: `Bearer ${token}` },
          })
            .then((res) => (res.ok ? res.json() : null))
            .then((data) => {
              if (data && data.CartItems) {
                this.setState({ cartCount: data.CartItems.length });
              }
            })
            .catch(() => {});
        }

        fetchUser() {
          const token = localStorage.getItem("accessToken");
          if (!token) {
            this.setState({ userError: "no_token", loadingUser: false });
            return;
          }
          fetch("http://localhost:8000/api/users/me/", {
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
          })
            .then((res) => {
              if (!res.ok) throw new Error("Unauthorized");
              return res.json();
            })
            .then((data) => this.setState({ user: data, loadingUser: false }))
            .catch((err) =>
              this.setState({ userError: err.message, loadingUser: false })
            );
        }

        fetchProducts() {
          this.setState({ loadingProducts: true, productError: null });
          const token = localStorage.getItem("accessToken");
          fetch("http://localhost:8000/api/products/", {
            headers: token ? { Authorization: `Bearer ${token}` } : {},
          })
            .then((res) => {
              if (!res.ok) throw new Error(`Server error ${res.status}`);
              return res.json();
            })
            .then((data) =>
              this.setState({ products: data, loadingProducts: false })
            )
            .catch((err) =>
              this.setState({
                productError: err.message,
                loadingProducts: false,
              })
            );
        }

        handleLogout() {
          localStorage.removeItem("accessToken");
          location.reload();
        }

        handleAdd(product) {
          const token = localStorage.getItem("accessToken");
          if (!token) {
            this.setState({ toast: "Please log in first" });
            this._t = setTimeout(() => this.setState({ toast: null }), 2800);
            return;
          }

          fetch("http://localhost:8000/api/cart/add/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ product_id: product.id, quantity: 1 }),
          })
            .then((res) => res.json().then((data) => ({ ok: res.ok, data })))
            .then(({ ok, data }) => {
              if (!ok)
                throw new Error(data.error || "Could not add item to cart");
              if (this._t) clearTimeout(this._t);
              this.setState((prev) => ({
                toast: `${product.name} added to your bag`,
                cartCount: prev.cartCount + 1,
              }));
              this._t = setTimeout(() => this.setState({ toast: null }), 2800);
            })
            .catch((err) => {
              if (this._t) clearTimeout(this._t);
              this.setState({ toast: err.message });
              this._t = setTimeout(() => this.setState({ toast: null }), 2800);
            });
        }

        getCategories() {
          const cats = new Set();
          this.state.products.forEach((p) => {
            const s = (p.name + " " + (p.description || "")).toLowerCase();
            if (
              s.match(
                /shirt|tee|cloth|wear|fashion|dress|jeans|jacket|hoodie|shoe|sneaker|bag|backpack/
              )
            )
              cats.add("Fashion");
            else if (
              s.match(/phone|laptop|computer|tech|electronic|watch|clock/)
            )
              cats.add("Electronics");
            else if (s.match(/book|novel/)) cats.add("Books");
            else if (s.match(/beauty|skin|cream|makeup|lotion/))
              cats.add("Beauty");
            else if (s.match(/food|snack|coffee|tea|drink/))
              cats.add("Food & Drink");
            else if (s.match(/home|kitchen|cook|decor|furniture/))
              cats.add("Home");
            else cats.add("General");
          });
          return ["All", ...cats];
        }

        getFiltered() {
          let list = this.state.products;
          const { filter, search } = this.state;
          if (search.trim()) {
            const q = search.toLowerCase();
            list = list.filter(
              (p) =>
                p.name.toLowerCase().includes(q) ||
                (p.description || "").toLowerCase().includes(q)
            );
          }
          if (filter === "All") return list;
          return list.filter((p) => {
            const s = (p.name + " " + (p.description || "")).toLowerCase();
            if (filter === "Fashion")
              return !!s.match(
                /shirt|tee|cloth|wear|fashion|dress|jeans|jacket|hoodie|shoe|sneaker|bag|backpack/
              );
            if (filter === "Electronics")
              return !!s.match(
                /phone|laptop|computer|tech|electronic|watch|clock/
              );
            if (filter === "Books") return !!s.match(/book|novel/);
            if (filter === "Beauty")
              return !!s.match(/beauty|skin|cream|makeup|lotion/);
            if (filter === "Food & Drink")
              return !!s.match(/food|snack|coffee|tea|drink/);
            if (filter === "Home")
              return !!s.match(/home|kitchen|cook|decor|furniture/);
            return !s.match(
              /shirt|tee|cloth|wear|fashion|dress|jeans|jacket|hoodie|shoe|sneaker|bag|backpack|phone|laptop|computer|tech|electronic|watch|clock|book|novel|beauty|skin|cream|makeup|lotion|food|snack|coffee|tea|drink|home|kitchen|cook|decor|furniture/
            );
          });
        }

        render() {
          const {
            user,
            loadingUser,
            userError,
            loadingProducts,
            productError,
            toast,
            search,
            filter,
            cartCount,
          } = this.state;
          const categories = this.getCategories();
          const filtered = this.getFiltered();

          if (!loadingUser && userError === "no_token") {
            return (
              <div className="state-box">
                <div className="state-icon">🔒</div>
                <div className="state-title">Please Log In</div>
                <div className="state-msg">
                  You need to be logged in to access the dashboard.
                </div>
                <a href="../Login/login.html">
                  <button className="state-btn accent">Go to Login</button>
                </a>
              </div>
            );
          }

          if (!loadingUser && userError && userError !== "no_token") {
            return (
              <div className="state-box">
                <div className="state-icon">⚠️</div>
                <div className="state-title">Session Expired</div>
                <div className="state-msg">
                  Your session is no longer valid. Please log in again.
                </div>
                <button
                  className="state-btn accent"
                  onClick={this.handleLogout}
                >
                  Log In Again
                </button>
              </div>
            );
          }

          const displayName = user
            ? user.first_name || user.username || "User"
            : "…";
          const initials = user
            ? getInitials(user.username || user.first_name || "U")
            : "…";

          return (
            <Fragment>
              {/* NAV */}
              <nav>
                {/* Left: user info */}
                <div className="nav-user">
                  <div className="nav-user-avatar">{initials}</div>
                  <div>
                    <div className="nav-user-name">{displayName}</div>
                    {user && user.email && (
                      <div className="nav-user-role">{user.email}</div>
                    )}
                  </div>
                </div>

                {/* Center: logo */}
                <div className="nav-logo">Maison</div>

                {/* Right: actions */}
                <div className="nav-actions">
                  <a href="../index.html" className="nav-home-link">
                    ← Shop
                  </a>

                  {/* Cart icon with badge */}
                  <a
                    href="../Cart/cart.html"
                    className="cart-icon-btn"
                    title="View Cart"
                  >
                    <CartIcon />
                    {cartCount > 0 && (
                      <span className="cart-badge">
                        {cartCount > 99 ? "99+" : cartCount}
                      </span>
                    )}
                  </a>

                  <button className="logout-btn" onClick={this.handleLogout}>
                    Logout
                  </button>
                </div>
              </nav>

              {/* PAGE */}
              <div className="page">
                <div className="page-header">
                  <div>
                    <div className="page-label">✦ Your Store</div>
                    <div className="page-title">Products</div>
                  </div>
                  {!loadingProducts && !productError && (
                    <div className="product-count">
                      {filtered.length} item{filtered.length !== 1 ? "s" : ""}
                    </div>
                  )}
                </div>

                {/* TOOLBAR */}
                {!loadingProducts && !productError && (
                  <div className="toolbar">
                    <input
                      className="search-input"
                      type="text"
                      placeholder="Search products..."
                      value={search}
                      onChange={(e) =>
                        this.setState({ search: e.target.value })
                      }
                    />
                    {categories.map((cat) => (
                      <button
                        key={cat}
                        className={`cat-chip${filter === cat ? " active" : ""}`}
                        onClick={() => this.setState({ filter: cat })}
                      >
                        {cat}
                      </button>
                    ))}
                  </div>
                )}

                {/* LOADING */}
                {loadingProducts && (
                  <div className="product-grid">
                    {[1, 2, 3, 4, 5, 6].map((i) => (
                      <SkeletonCard key={i} />
                    ))}
                  </div>
                )}

                {/* PRODUCT ERROR */}
                {productError && (
                  <div className="state-box">
                    <div className="state-icon">⚠️</div>
                    <div className="state-title">Couldn't Load Products</div>
                    <div className="state-msg">
                      Make sure your API is running at{" "}
                      <strong>localhost:8000</strong>.<br />
                      <small style={{ opacity: 0.6 }}>{productError}</small>
                    </div>
                    <button className="state-btn" onClick={this.fetchProducts}>
                      Try Again
                    </button>
                  </div>
                )}

                {/* EMPTY */}
                {!loadingProducts && !productError && filtered.length === 0 && (
                  <div className="state-box">
                    <div className="state-icon">🔍</div>
                    <div className="state-title">No Results</div>
                    <div className="state-msg">
                      Try a different search or category.
                    </div>
                  </div>
                )}

                {/* GRID */}
                {!loadingProducts && !productError && filtered.length > 0 && (
                  <div className="product-grid">
                    {filtered.map((p, i) => (
                      <ProductCard key={i} product={p} onAdd={this.handleAdd} />
                    ))}
                  </div>
                )}
              </div>

              {/* FOOTER */}
              <footer>
                <div className="footer-brand">Maison</div>
                <div className="footer-copy">
                  © 2026 Maison. All rights reserved.
                </div>
              </footer>

              {/* TOAST */}
              {toast && <div className="toast">🛍️ {toast}</div>}
            </Fragment>
          );
        }
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <Dashboard />
      );
    </script>
  </body>
</html>
