<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison — Your Cart</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="../Components/navbar.js" defer></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #faf7f2;
        --warm: #f2ece0;
        --sand: #e5d9c5;
        --stone: #c9b99a;
        --bark: #7a6248;
        --ink: #1e1810;
        --accent: #c0392b;
        --accent-lt: #e8d5d3;
        --text: #2c231a;
        --muted: #9a8878;
        --border: #ddd3c2;
        --r: 12px;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--cream);
        color: var(--text);
        font-family: "Jost", sans-serif;
        font-weight: 300;
        min-height: 100vh;
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--cream);
        border-bottom: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 48px;
        height: 68px;
      }
      .nav-logo {
        text-align: center;
        font-family: "Cormorant Garamond", serif;
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--ink);
      }
      .nav-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .nav-user-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--bark);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Cormorant Garamond", serif;
        font-size: 15px;
        color: var(--cream);
        font-weight: 600;
        flex-shrink: 0;
      }
      .nav-user-name {
        font-size: 13px;
        color: var(--text);
        letter-spacing: 0.3px;
      }
      .nav-user-role {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .nav-actions {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: flex-end;
      }
      .nav-link {
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        transition: color 0.2s;
        cursor: pointer;
        background: none;
        border: none;
        font-family: "Jost", sans-serif;
        font-weight: 300;
      }
      .nav-link:hover {
        color: var(--ink);
      }
      .logout-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 7px 18px;
        border-radius: 2px;
        font-family: "Jost", sans-serif;
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }
      .logout-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .page {
        padding: 48px;
        max-width: 900px;
        margin: 0 auto;
      }

      .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 40px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--border);
      }
      .page-label {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--bark);
        margin-bottom: 6px;
      }
      .page-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(32px, 4vw, 48px);
        font-weight: 300;
        color: var(--ink);
        line-height: 1.1;
      }

      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 0;
        border-bottom: 1px solid var(--border);
        gap: 16px;
      }
      .cart-item-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .cart-item-icon {
        width: 56px;
        height: 56px;
        background: var(--warm);
        border: 1px solid var(--border);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        flex-shrink: 0;
      }
      .cart-item-name {
        font-family: "Cormorant Garamond", serif;
        font-size: 20px;
        font-weight: 400;
        color: var(--ink);
      }
      .cart-item-qty {
        font-size: 12px;
        color: var(--muted);
        margin-top: 3px;
        letter-spacing: 0.5px;
      }
      .cart-item-right {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
      }
      .cart-item-price {
        font-size: 16px;
        font-weight: 500;
        color: var(--ink);
      }
      .delete-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .delete-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-lt);
      }

      .cart-summary {
        margin-top: 32px;
        display: flex;
        justify-content: flex-end;
      }
      .summary-box {
        background: var(--warm);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 24px 28px;
        min-width: 260px;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 8px;
        letter-spacing: 0.5px;
      }
      .summary-total {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid var(--border);
        padding-top: 14px;
        margin-top: 8px;
        margin-bottom: 20px;
      }
      .summary-total-label {
        font-family: "Cormorant Garamond", serif;
        font-size: 20px;
        color: var(--ink);
      }
      .summary-total-amount {
        font-size: 20px;
        font-weight: 500;
        color: var(--ink);
      }
      .checkout-btn {
        width: 100%;
        background: var(--ink);
        color: var(--cream);
        border: none;
        padding: 14px;
        font-family: "Jost", sans-serif;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 2px;
        transition: background 0.2s;
      }
      .checkout-btn:hover {
        background: var(--bark);
      }

      /* Empty state */
      .empty-state {
        text-align: center;
        padding: 80px 48px;
        background: var(--warm);
        border: 1px solid var(--border);
        border-radius: 16px;
        max-width: 440px;
        margin: 60px auto;
      }
      .empty-icon {
        font-size: 48px;
        margin-bottom: 20px;
        opacity: 0.6;
      }
      .empty-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 32px;
        font-weight: 300;
        color: var(--ink);
        margin-bottom: 10px;
      }
      .empty-msg {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
        margin-bottom: 28px;
      }
      .continue-btn {
        background: var(--ink);
        color: var(--cream);
        border: none;
        border-radius: 2px;
        padding: 13px 32px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        font-family: "Jost", sans-serif;
        transition: background 0.2s;
        text-decoration: none;
        display: inline-block;
      }
      .continue-btn:hover {
        background: var(--bark);
      }

      /* Loading skeleton */
      .sk-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 0;
        border-bottom: 1px solid var(--border);
        gap: 16px;
        animation: shimmer 1.5s ease-in-out infinite;
      }
      .sk-circle {
        width: 56px;
        height: 56px;
        background: var(--warm);
        border-radius: 10px;
        flex-shrink: 0;
      }
      .sk-line {
        height: 12px;
        border-radius: 4px;
        background: var(--warm);
      }
      @keyframes shimmer {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }

      /* Error state */
      .error-box {
        background: var(--accent-lt);
        border: 1px solid #dbb;
        border-radius: var(--r);
        padding: 20px 24px;
        color: var(--accent);
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      footer {
        background: var(--ink);
        color: var(--stone);
        padding: 32px 48px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        margin-top: 80px;
      }
      .footer-brand {
        font-family: "Cormorant Garamond", serif;
        font-size: 22px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--cream);
      }
      .footer-copy {
        font-size: 12px;
        color: var(--muted);
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ink);
        color: var(--cream);
        padding: 14px 28px;
        border-radius: 50px;
        font-size: 13px;
        z-index: 300;
        white-space: nowrap;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
        animation: toastIn 0.3s ease;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      @media (max-width: 768px) {
        nav {
          padding: 0 20px;
        }
        .page {
          padding: 32px 20px;
        }
        footer {
          padding: 24px 20px;
          flex-direction: column;
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { Component, Fragment } = React;

      function getEmoji(name) {
        const s = (name || "").toLowerCase();
        if (s.match(/shirt|tee|cloth|wear|fashion|dress|jeans|jacket|hoodie/))
          return "👕";
        if (s.match(/shoe|sneaker|boot|footwear|sandal/)) return "👟";
        if (s.match(/bag|backpack|purse|wallet|tote/)) return "👜";
        if (s.match(/watch|clock/)) return "⌚";
        if (s.match(/book|novel|read/)) return "📚";
        if (s.match(/food|snack|coffee|tea|drink|eat/)) return "🍵";
        if (s.match(/beauty|skin|cream|lotion|perfume|makeup/)) return "🧴";
        if (s.match(/plant|flower|garden/)) return "🌿";
        if (s.match(/toy|game|play/)) return "🎲";
        if (s.match(/sport|gym|yoga|fitness/)) return "🏃";
        if (s.match(/phone|laptop|computer|tech|electronic/)) return "💻";
        if (s.match(/kitchen|cook|home|decor|furniture/)) return "🏠";
        return "🛍️";
      }

      function formatPrice(p) {
        return "$" + parseFloat(p).toFixed(2);
      }

      function getInitials(username) {
        if (!username) return "?";
        return username.slice(0, 2).toUpperCase();
      }

      class CartPage extends Component {
        constructor(props) {
          super(props);
          this.state = {
            user: null,
            cartItems: [],
            totalAmount: null,
            loading: true,
            error: null,
            toast: null,
            deletingId: null,
          };
          this.handleDelete = this.handleDelete.bind(this);
          this.handleLogout = this.handleLogout.bind(this);
          this.showToast = this.showToast.bind(this);
          this.handleCheckout = this.handleCheckout.bind(this);
        }

        componentDidMount() {
          this.fetchUser();
          this.fetchCart();
        }

        showToast(msg) {
          if (this._t) clearTimeout(this._t);
          this.setState({ toast: msg });
          this._t = setTimeout(() => this.setState({ toast: null }), 2800);
        }

        fetchUser() {
          const token = localStorage.getItem("accessToken");
          if (!token) return;
          fetch("http://localhost:8001/api/users/me/", {
            headers: { Authorization: `Bearer ${token}` },
          })
            .then((res) => (res.ok ? res.json() : null))
            .then((data) => {
              if (data) this.setState({ user: data });
            })
            .catch(() => {});
        }

        fetchCart() {
          const token = localStorage.getItem("accessToken");
          if (!token) {
            this.setState({ error: "no_token", loading: false });
            return;
          }
          this.setState({ loading: true, error: null });
          fetch("http://localhost:8001/api/cart/items/", {
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
          })
            .then((res) => res.json().then((data) => ({ ok: res.ok, data })))
            .then(({ ok, data }) => {
              if (!ok) throw new Error(data.error || "Could not load cart");
              this.setState({
                cartItems: data.CartItems || [],
                totalAmount: data.total_amount,
                loading: false,
              });
            })
            .catch((err) =>
              this.setState({ error: err.message, loading: false })
            );
        }

        handleDelete(id) {
          const token = localStorage.getItem("accessToken");
          this.setState({ deletingId: id });
          fetch("http://localhost:8001/api/cart/delete/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ id }),
          })
            .then((res) => res.json().then((data) => ({ ok: res.ok, data })))
            .then(({ ok, data }) => {
              if (!ok || !data.success) throw new Error("Delete failed");
              this.setState((prev) => ({
                cartItems: prev.cartItems.filter((item) => item.id !== id),
                deletingId: null,
              }));
              this.showToast("Item removed from your bag");
            })
            .catch((err) => {
              this.setState({ deletingId: null });
              this.showToast("Could not remove item");
            });
        }

        handleCheckout() {
          const token = localStorage.getItem("accessToken");

          if (!token) {
            this.showToast("Please login first");
            return;
          }

          fetch("http://localhost:8001/api/orders/checkout/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
          })
            .then((res) => res.json().then((data) => ({ ok: res.ok, data })))
            .then(({ ok, data }) => {
              if (!ok) throw new Error(data.error || "Checkout failed");

              this.showToast("Order placed successfully 🧾");
            })
            .catch((err) => {
              this.showToast(err.message || "Checkout failed");
            });
        }
        handleLogout() {
          localStorage.removeItem("accessToken");
          location.href = "../Login/login.html";
        }

        render() {
          const {
            user,
            cartItems,
            totalAmount,
            loading,
            error,
            toast,
            deletingId,
          } = this.state;
          const initials = user
            ? getInitials(user.username || user.first_name || "U")
            : "…";
          const displayName = user
            ? user.first_name || user.username || "User"
            : "…";

          if (!loading && error === "no_token") {
            return (
              <div
                style={{
                  textAlign: "center",
                  padding: "80px 48px",
                  background: "var(--warm)",
                  border: "1px solid var(--border)",
                  borderRadius: "16px",
                  maxWidth: "440px",
                  margin: "80px auto",
                }}
              >
                <div style={{ fontSize: "40px", marginBottom: "16px" }}>🔒</div>
                <div
                  style={{
                    fontFamily: '"Cormorant Garamond", serif',
                    fontSize: "28px",
                    fontWeight: "300",
                    color: "var(--ink)",
                    marginBottom: "8px",
                  }}
                >
                  Please Log In
                </div>
                <div
                  style={{
                    color: "var(--muted)",
                    fontSize: "13px",
                    marginBottom: "24px",
                  }}
                >
                  You need to be logged in to view your cart.
                </div>
                <a href="../Login/login.html">
                  <button
                    style={{
                      background: "var(--accent)",
                      color: "var(--cream)",
                      border: "none",
                      borderRadius: "2px",
                      padding: "12px 28px",
                      fontSize: "11px",
                      letterSpacing: "2px",
                      textTransform: "uppercase",
                      cursor: "pointer",
                      fontFamily: '"Jost", sans-serif',
                    }}
                  >
                    Go to Login
                  </button>
                </a>
              </div>
            );
          }

          return (
            <Fragment>
              <maison-navbar active="cart"></maison-navbar>

              <div className="page">
                <div className="page-header">
                  <div>
                    <div className="page-label">✦ Your Bag</div>
                    <div className="page-title">Shopping Cart</div>
                  </div>
                  {!loading && !error && (
                    <div
                      style={{
                        fontFamily: '"Cormorant Garamond", serif',
                        fontSize: "13px",
                        color: "var(--muted)",
                        letterSpacing: "1px",
                      }}
                    >
                      {cartItems.length} item{cartItems.length !== 1 ? "s" : ""}
                    </div>
                  )}
                </div>

                {/* Loading */}
                {loading && (
                  <div>
                    {[1, 2, 3].map((i) => (
                      <div key={i} className="sk-row">
                        <div
                          style={{
                            display: "flex",
                            alignItems: "center",
                            gap: "16px",
                            flex: 1,
                          }}
                        >
                          <div className="sk-circle" />
                          <div style={{ flex: 1 }}>
                            <div
                              className="sk-line"
                              style={{ width: "45%", marginBottom: "8px" }}
                            />
                            <div className="sk-line" style={{ width: "25%" }} />
                          </div>
                        </div>
                        <div className="sk-line" style={{ width: "60px" }} />
                      </div>
                    ))}
                  </div>
                )}

                {/* Error */}
                {!loading && error && error !== "no_token" && (
                  <div className="error-box">
                    <span>⚠️</span>
                    <span>Could not load your cart: {error}</span>
                    <button
                      onClick={this.fetchCart.bind(this)}
                      style={{
                        marginLeft: "auto",
                        background: "var(--accent)",
                        color: "white",
                        border: "none",
                        padding: "6px 14px",
                        borderRadius: "2px",
                        cursor: "pointer",
                        fontSize: "11px",
                        letterSpacing: "1px",
                        textTransform: "uppercase",
                        fontFamily: '"Jost", sans-serif',
                      }}
                    >
                      Retry
                    </button>
                  </div>
                )}

                {/* Empty */}
                {!loading && !error && cartItems.length === 0 && (
                  <div className="empty-state">
                    <div className="empty-icon">🛍️</div>
                    <div className="empty-title">Your bag is empty</div>
                    <div className="empty-msg">
                      Looks like you haven't added anything yet.
                      <br />
                      Explore our collection and find something you love.
                    </div>
                    <a
                      href="../Dashboard/dashboard.html"
                      className="continue-btn"
                    >
                      Continue Shopping
                    </a>
                  </div>
                )}

                {/* Cart items */}
                {!loading && !error && cartItems.length > 0 && (
                  <Fragment>
                    <div>
                      {cartItems.map((item, index) => (
                        <div
                          key={item.id || index}
                          className="cart-item"
                          style={{
                            opacity: deletingId === item.id ? 0.4 : 1,
                            transition: "opacity 0.2s",
                          }}
                        >
                          <div className="cart-item-left">
                            <div className="cart-item-icon">
                              {getEmoji(item.product)}
                            </div>
                            <div>
                              <div className="cart-item-name">
                                {item.product}
                              </div>
                              <div className="cart-item-qty">
                                Quantity: {item.quantity}
                              </div>
                            </div>
                          </div>
                          <div className="cart-item-right">
                            <div className="cart-item-price">
                              {formatPrice(item.price)}
                            </div>
                            <button
                              className="delete-btn"
                              onClick={() => this.handleDelete(item.id)}
                              disabled={deletingId === item.id}
                              title="Remove item"
                            >
                              ✕
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>

                    <div className="cart-summary">
                      <div className="summary-box">
                        <div className="summary-row">
                          <span>
                            Subtotal ({cartItems.length} item
                            {cartItems.length !== 1 ? "s" : ""})
                          </span>
                          <span>
                            {totalAmount
                              ? "$" + parseFloat(totalAmount).toFixed(2)
                              : "—"}
                          </span>
                        </div>
                        <div className="summary-row">
                          <span>Shipping</span>
                          <span>Calculated at checkout</span>
                        </div>
                        <div className="summary-total">
                          <span className="summary-total-label">Total</span>
                          <span className="summary-total-amount">
                            {totalAmount
                              ? "$" + parseFloat(totalAmount).toFixed(2)
                              : "—"}
                          </span>
                        </div>
                        <button
                          className="checkout-btn"
                          onClick={this.handleCheckout}
                        >
                          Proceed to Checkout
                        </button>
                        <div style={{ textAlign: "center", marginTop: "14px" }}>
                          <a
                            href="../Dashboard/dashboard.html"
                            style={{
                              fontSize: "11px",
                              color: "var(--muted)",
                              letterSpacing: "1px",
                              textTransform: "uppercase",
                              textDecoration: "none",
                            }}
                          >
                            ← Continue Shopping
                          </a>
                        </div>
                      </div>
                    </div>
                  </Fragment>
                )}
              </div>

              <footer>
                <div className="footer-brand">Maison</div>
                <div className="footer-copy">
                  © 2026 Maison. All rights reserved.
                </div>
              </footer>

              {toast && <div className="toast">🛍️ {toast}</div>}
            </Fragment>
          );
        }
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<CartPage />);
    </script>
  </body>
</html>
