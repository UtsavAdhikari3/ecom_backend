<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison — My Orders</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="../Components/navbar.js" defer></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #faf7f2;
        --warm: #f2ece0;
        --sand: #e5d9c5;
        --stone: #c9b99a;
        --bark: #7a6248;
        --ink: #1e1810;
        --accent: #c0392b;
        --accent-lt: #e8d5d3;
        --text: #2c231a;
        --muted: #9a8878;
        --border: #ddd3c2;
        --r: 12px;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--cream);
        color: var(--text);
        font-family: "Jost", sans-serif;
        font-weight: 300;
        min-height: 100vh;
      }

      .page {
        padding: 48px;
        max-width: 900px;
        margin: 0 auto;
      }
      .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 40px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--border);
      }
      .page-label {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--bark);
        margin-bottom: 6px;
      }
      .page-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(32px, 4vw, 48px);
        font-weight: 300;
        color: var(--ink);
        line-height: 1.1;
      }

      .order-card {
        background: var(--warm);
        border: 1px solid var(--border);
        border-radius: var(--r);
        margin-bottom: 20px;
        overflow: hidden;
      }
      .order-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 24px;
        cursor: pointer;
        gap: 16px;
        user-select: none;
      }
      .order-header:hover {
        background: var(--sand);
        transition: background 0.2s;
      }
      .order-id {
        font-family: "Cormorant Garamond", serif;
        font-size: 20px;
        font-weight: 400;
        color: var(--ink);
      }
      .order-meta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 3px;
        letter-spacing: 0.5px;
      }
      .order-right {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
      }
      .order-total {
        font-size: 16px;
        font-weight: 500;
        color: var(--ink);
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 50px;
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-weight: 400;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        display: inline-block;
      }
      .status-pending {
        background: #faeeda;
        color: #854f0b;
        border: 1px solid #fac775;
      }
      .status-processing {
        background: #e6f1fb;
        color: #185fa5;
        border: 1px solid #85b7eb;
      }
      .status-shipped {
        background: #eaf3de;
        color: #3b6d11;
        border: 1px solid #97c459;
      }
      .status-delivered {
        background: #eaf3de;
        color: #27500a;
        border: 2px solid #639922;
      }
      .status-cancelled {
        background: var(--accent-lt);
        color: var(--accent);
        border: 1px solid #e8a09a;
      }
      .status-default {
        background: var(--sand);
        color: var(--bark);
        border: 1px solid var(--stone);
      }

      .order-items {
        border-top: 1px solid var(--border);
        padding: 0 24px;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s ease, padding 0.2s;
      }
      .order-items.open {
        max-height: 600px;
        padding: 16px 24px 20px;
      }

      .item-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        gap: 12px;
      }
      .item-row:last-child {
        border-bottom: none;
      }
      .item-name {
        font-family: "Cormorant Garamond", serif;
        font-size: 18px;
        color: var(--ink);
      }
      .item-qty {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      .item-price {
        font-size: 14px;
        font-weight: 500;
        color: var(--ink);
        flex-shrink: 0;
      }

      .chevron {
        font-size: 12px;
        color: var(--muted);
        transition: transform 0.25s;
        display: inline-block;
      }
      .chevron.open {
        transform: rotate(180deg);
      }

      .order-footer-total {
        display: flex;
        justify-content: flex-end;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .order-footer-total-label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .order-footer-total-amount {
        font-family: "Cormorant Garamond", serif;
        font-size: 22px;
        color: var(--ink);
      }

      .sk-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 24px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        margin-bottom: 16px;
        animation: shimmer 1.5s ease-in-out infinite;
      }
      .sk-line {
        height: 12px;
        border-radius: 4px;
        background: var(--sand);
      }
      @keyframes shimmer {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }

      .error-box {
        background: var(--accent-lt);
        border: 1px solid #dbb;
        border-radius: var(--r);
        padding: 20px 24px;
        color: var(--accent);
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .retry-btn {
        margin-left: auto;
        background: var(--accent);
        color: white;
        border: none;
        padding: 6px 14px;
        border-radius: 2px;
        cursor: pointer;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "Jost", sans-serif;
      }

      .empty-state {
        text-align: center;
        padding: 80px 48px;
        background: var(--warm);
        border: 1px solid var(--border);
        border-radius: 16px;
        max-width: 440px;
        margin: 60px auto;
      }
      .empty-icon {
        font-size: 48px;
        margin-bottom: 20px;
        opacity: 0.6;
      }
      .empty-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 32px;
        font-weight: 300;
        color: var(--ink);
        margin-bottom: 10px;
      }
      .empty-msg {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
        margin-bottom: 28px;
      }
      .continue-btn {
        background: var(--ink);
        color: var(--cream);
        border: none;
        border-radius: 2px;
        padding: 13px 32px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        font-family: "Jost", sans-serif;
        transition: background 0.2s;
        text-decoration: none;
        display: inline-block;
      }
      .continue-btn:hover {
        background: var(--bark);
      }

      footer {
        background: var(--ink);
        color: var(--stone);
        padding: 32px 48px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        margin-top: 80px;
      }
      .footer-brand {
        font-family: "Cormorant Garamond", serif;
        font-size: 22px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--cream);
      }
      .footer-copy {
        font-size: 12px;
        color: var(--muted);
      }

      .toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ink);
        color: var(--cream);
        padding: 14px 28px;
        border-radius: 50px;
        font-size: 13px;
        z-index: 300;
        white-space: nowrap;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
        animation: toastIn 0.3s ease;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      @media (max-width: 768px) {
        .page {
          padding: 32px 20px;
        }
        footer {
          padding: 24px 20px;
          flex-direction: column;
          gap: 12px;
        }
        .order-right {
          flex-wrap: wrap;
          justify-content: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navbar component handles user info, logout, and active link highlighting -->
    <maison-navbar active="orders"></maison-navbar>

    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-label">✦ Order History</div>
          <div class="page-title">My Orders</div>
        </div>
        <div
          id="order-count"
          style="
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 1px;
          "
        ></div>
      </div>

      <!-- Loading skeleton -->
      <div id="loading-state">
        <div class="sk-row">
          <div style="display: flex; align-items: center; gap: 16px; flex: 1">
            <div style="flex: 1">
              <div class="sk-line" style="width: 30%; margin-bottom: 8px"></div>
              <div class="sk-line" style="width: 20%"></div>
            </div>
          </div>
          <div class="sk-line" style="width: 80px"></div>
        </div>
        <div class="sk-row">
          <div style="display: flex; align-items: center; gap: 16px; flex: 1">
            <div style="flex: 1">
              <div class="sk-line" style="width: 35%; margin-bottom: 8px"></div>
              <div class="sk-line" style="width: 25%"></div>
            </div>
          </div>
          <div class="sk-line" style="width: 80px"></div>
        </div>
        <div class="sk-row">
          <div style="display: flex; align-items: center; gap: 16px; flex: 1">
            <div style="flex: 1">
              <div class="sk-line" style="width: 28%; margin-bottom: 8px"></div>
              <div class="sk-line" style="width: 18%"></div>
            </div>
          </div>
          <div class="sk-line" style="width: 80px"></div>
        </div>
      </div>

      <!-- Error state -->
      <div id="error-state" style="display: none">
        <div class="error-box">
          <span>⚠️</span>
          <span id="error-msg">Could not load your orders.</span>
          <button class="retry-btn" onclick="fetchOrders()">Retry</button>
        </div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" style="display: none">
        <div class="empty-state">
          <div class="empty-icon">📦</div>
          <div class="empty-title">No orders yet</div>
          <div class="empty-msg">
            You haven't placed any orders yet.<br />
            Explore our collection and find something you love.
          </div>
          <a href="../Dashboard/dashboard.html" class="continue-btn"
            >Start Shopping</a
          >
        </div>
      </div>

      <!-- Orders list -->
      <div id="orders-list"></div>
    </div>

    <footer>
      <div class="footer-brand">Maison</div>
      <div class="footer-copy">© 2026 Maison. All rights reserved.</div>
    </footer>

    <div id="toast" class="toast" style="display: none"></div>

    <script>
      function getStatusClass(s) {
        const v = (s || "").toLowerCase();
        if (v === "pending") return "status-pending";
        if (v === "processing") return "status-processing";
        if (v === "shipped") return "status-shipped";
        if (v === "delivered") return "status-delivered";
        if (v === "cancelled") return "status-cancelled";
        return "status-default";
      }

      function formatPrice(p) {
        return "$" + parseFloat(p).toFixed(2);
      }

      function getEmoji(name) {
        const s = (name || "").toLowerCase();
        if (s.match(/shirt|tee|cloth|wear|fashion|dress|jeans|jacket|hoodie/))
          return "👕";
        if (s.match(/shoe|sneaker|boot|footwear|sandal/)) return "👟";
        if (s.match(/bag|backpack|purse|wallet|tote/)) return "👜";
        if (s.match(/watch|clock/)) return "⌚";
        if (s.match(/book|novel|read/)) return "📚";
        if (s.match(/food|snack|coffee|tea|drink|eat/)) return "🍵";
        if (s.match(/beauty|skin|cream|lotion|perfume|makeup/)) return "🧴";
        if (s.match(/plant|flower|garden/)) return "🌿";
        if (s.match(/toy|game|play/)) return "🎲";
        if (s.match(/sport|gym|yoga|fitness/)) return "🏃";
        if (s.match(/phone|laptop|computer|tech|electronic/)) return "💻";
        if (s.match(/kitchen|cook|home|decor|furniture/)) return "🏠";
        return "🛍️";
      }

      let _toastTimer;
      function showToast(msg) {
        clearTimeout(_toastTimer);
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.style.display = "block";
        _toastTimer = setTimeout(() => (t.style.display = "none"), 2800);
      }

      function toggleOrder(id) {
        const items = document.getElementById("items-" + id);
        const chev = document.getElementById("chev-" + id);
        items.classList.toggle("open");
        chev.classList.toggle("open");
      }

      function fetchOrders() {
        const token = localStorage.getItem("accessToken");
        if (!token) {
          document.getElementById("loading-state").style.display = "none";
          document.getElementById("error-state").style.display = "block";
          document.getElementById("error-msg").textContent =
            "Please log in to view your orders.";
          return;
        }

        document.getElementById("loading-state").style.display = "block";
        document.getElementById("error-state").style.display = "none";
        document.getElementById("empty-state").style.display = "none";
        document.getElementById("orders-list").innerHTML = "";

        fetch("http://localhost:8000/api/orders/", {
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
        })
          .then((r) => r.json().then((data) => ({ ok: r.ok, data })))
          .then(({ ok, data }) => {
            document.getElementById("loading-state").style.display = "none";
            if (!ok) throw new Error(data.error || "Could not load orders");

            const orders = data.orders || [];
            if (orders.length === 0) {
              document.getElementById("empty-state").style.display = "block";
              return;
            }

            document.getElementById("order-count").textContent =
              orders.length + " order" + (orders.length !== 1 ? "s" : "");

            const list = document.getElementById("orders-list");

            orders.forEach((order) => {
              const statusClass = getStatusClass(order.status);
              const itemCount = (order.items || []).length;

              const itemsHtml = (order.items || [])
                .map(
                  (item) => `
                  <div class="item-row">
                    <div style="display:flex;align-items:center;gap:12px;">
                      <div style="font-size:22px;width:36px;text-align:center;">${getEmoji(
                        item.product
                      )}</div>
                      <div>
                        <div class="item-name">${item.product}</div>
                        <div class="item-qty">Qty: ${item.quantity}</div>
                      </div>
                    </div>
                    <div class="item-price">${formatPrice(item.price)}</div>
                  </div>`
                )
                .join("");

              const card = document.createElement("div");
              card.className = "order-card";
              card.innerHTML = `
                <div class="order-header" onclick="toggleOrder(${
                  order.order_id
                })">
                  <div>
                    <div class="order-id">Order #${order.order_id}</div>
                    <div class="order-meta">${itemCount} item${
                itemCount !== 1 ? "s" : ""
              }</div>
                  </div>
                  <div class="order-right">
                    <span class="status-badge ${statusClass}">
                      <span class="status-dot"></span>${order.status}
                    </span>
                    <div class="order-total">${formatPrice(
                      order.total_amount
                    )}</div>
                    <span class="chevron" id="chev-${order.order_id}">▼</span>
                  </div>
                </div>
                <div class="order-items" id="items-${order.order_id}">
                  ${itemsHtml}
                  <div class="order-footer-total">
                    <div style="text-align:right;">
                      <div class="order-footer-total-label">Order total</div>
                      <div class="order-footer-total-amount">${formatPrice(
                        order.total_amount
                      )}</div>
                    </div>
                  </div>
                </div>
              `;
              list.appendChild(card);
            });
          })
          .catch((err) => {
            document.getElementById("loading-state").style.display = "none";
            document.getElementById("error-state").style.display = "block";
            document.getElementById("error-msg").textContent =
              "Could not load your orders: " + err.message;
          });
      }

      // The navbar component handles fetchUser() and logout internally.
      // This page only needs to fetch its own data.
      fetchOrders();
    </script>
  </body>
</html>
