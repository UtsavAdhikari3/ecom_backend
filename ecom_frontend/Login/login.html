<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison — Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #faf7f2;
        --warm: #f2ece0;
        --sand: #e5d9c5;
        --stone: #c9b99a;
        --bark: #7a6248;
        --ink: #1e1810;
        --accent: #c0392b;
        --text: #2c231a;
        --muted: #9a8878;
        --border: #ddd3c2;
      }

      body {
        background: var(--cream);
        color: var(--text);
        font-family: "Jost", sans-serif;
        font-weight: 300;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .login-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
      }

      .login-card {
        background: var(--cream);
        border: 1px solid var(--border);
        padding: 48px;
        width: 100%;
        max-width: 440px;
        position: relative;
      }

      .brand-logo {
        font-family: "Cormorant Garamond", serif;
        font-size: 32px;
        font-weight: 600;
        letter-spacing: 8px;
        text-transform: uppercase;
        color: var(--ink);
        text-align: center;
        margin-bottom: 40px;
      }

      .form-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .form-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 28px;
        font-weight: 300;
        color: var(--ink);
        margin-bottom: 8px;
      }

      .form-subtitle {
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .field {
        margin-bottom: 24px;
      }

      .label {
        display: block;
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--bark);
        margin-bottom: 8px;
      }

      .input {
        width: 100%;
        padding: 12px 16px;
        background: var(--warm);
        border: 1px solid var(--border);
        font-family: "Jost", sans-serif;
        font-size: 14px;
        color: var(--ink);
        outline: none;
        transition: border-color 0.2s;
      }

      .input:focus {
        border-color: var(--bark);
      }

      .btn-submit {
        width: 100%;
        background: var(--ink);
        color: var(--cream);
        padding: 14px;
        border: none;
        font-family: "Jost", sans-serif;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 8px;
      }

      .btn-submit:hover {
        background: var(--bark);
      }

      .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .error-msg {
        background: #fdf2f2;
        color: var(--accent);
        font-size: 12px;
        padding: 12px;
        border: 1px solid #f9d7d7;
        margin-bottom: 20px;
        text-align: center;
      }

      .form-footer {
        margin-top: 32px;
        text-align: center;
        padding-top: 24px;
        border-top: 1px solid var(--border);
      }

      .footer-link {
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 1px;
        transition: color 0.2s;
      }

      .footer-link:hover {
        color: var(--ink);
      }

      footer {
        background: var(--ink);
        color: var(--stone);
        padding: 20px 48px; /* Slightly tighter padding */
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0; /* Ensures footer doesn't get squashed */
      }

      .footer-copy {
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { Component } = React;

      class LoginPage extends Component {
        constructor(props) {
          super(props);
          this.state = {
            username: "",
            password: "",
            loading: false,
            errorMsg: "",
          };
        }

        handleChange = (e) => {
          this.setState({ [e.target.name]: e.target.value });
        };

        handleSubmit = async (e) => {
          e.preventDefault();
          const { username, password } = this.state;
          this.setState({ loading: true, errorMsg: "" });

          try {
            const response = await fetch(
              "http://localhost:8001/api/users/login/",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password }),
              }
            );

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.message || "Invalid credentials");
            }

            if (data.access) {
              localStorage.setItem("accessToken", data.access);
              localStorage.setItem("refreshToken", data.refresh);
            }

            window.location.href = "../Dashboard/dashboard.html";
          } catch (err) {
            this.setState({ errorMsg: err.message, loading: false });
          }
        };

        render() {
          const { username, password, loading, errorMsg } = this.state;

          return (
            <React.Fragment>
              <div className="login-container">
                <div className="login-card">
                  <div className="brand-logo">Maison</div>

                  <div className="form-header">
                    <h2 className="form-title">Welcome back</h2>
                    <p className="form-subtitle">Sign in to your account</p>
                  </div>

                  {errorMsg && <div className="error-msg">{errorMsg}</div>}

                  <form onSubmit={this.handleSubmit}>
                    <div className="field">
                      <label className="label">Username</label>
                      <input
                        className="input"
                        type="text"
                        name="username"
                        value={username}
                        onChange={this.handleChange}
                        required
                      />
                    </div>

                    <div className="field">
                      <label className="label">Password</label>
                      <input
                        className="input"
                        type="password"
                        name="password"
                        value={password}
                        onChange={this.handleChange}
                        required
                      />
                    </div>

                    <button
                      className="btn-submit"
                      type="submit"
                      disabled={loading}
                    >
                      {loading ? "Authenticating..." : "Sign In"}
                    </button>
                  </form>

                  <div className="form-footer">
                    <a href="../Register/register.html" className="footer-link">
                      Don't have an account? Create one →
                    </a>
                  </div>
                </div>
              </div>
            </React.Fragment>
          );
        }
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<LoginPage />);
    </script>
  </body>
</html>
